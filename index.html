<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeslaSys Chile - Soporte</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="aplicacion-marco">
        
        <header class="header-moderno">
            <div class="logo-teslasys">TeslaSys Chile</div>
            <h2>Sistema de Registro de Solicitudes de Soporte</h2>
        </header>

        <div class="layout-principal">
            
            <div class="container">
                <h3>Formulario de Solicitud</h3>
                <form id="miFormulario">
                    <label for="nombre">Nombre del Colaborador:</label>
                    <input type="text" id="nombre" name="nombre">
                    
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email">
                    
                    <label for="area">Área de Trabajo:</label>
                    <input type="text" id="area" name="area">

                    <label for="tipo">Tipo de Solicitud:</label>
                    <select id="tipo" name="tipo">
                        <option value="">Seleccione un tipo...</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Software">Software</option>
                        <option value="Redes">Redes</option>
                        <option value="Seguridad">Seguridad</option>
                    </select>

                    <label for="descripcion">Descripción del Problema:</label>
                    <textarea id="descripcion" name="descripcion" rows="4"></textarea>
                    
                    <button type="submit">Registrar Solicitud</button>
                    <button type="reset" class="btn-limpiar">Limpiar Formulario</button>
                </form>
                <div id="errores"></div>
            </div>
            
            <div class="panel-registros">
                <div class="encabezado-panel">
                    <i class="fa-solid fa-list-ul"></i>
                    <h2>Solicitudes Registradas</h2>
                </div>
                
                <div class="tabla-moderna-contenedor">
                    <table id="tablaRegistros">
                        <thead>
                            <tr>
                                <th>Nº</th>
                                <th>Nombre</th>
                                <th>Área</th>
                                <th>Tipo de Solicitud</th>
                                <th>Descripción</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>

                <div class="info-footer">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>Total de solicitudes registradas: <span id="totalSolicitudes">0</span></span>
                </div>
            </div>

        </div>

        <footer class="footer-soporte">
            TeslaSys Chile - Área de Soporte TI
        </footer>

    </div>

    <script>
        function actualizarTotal() {
            let total = document.querySelectorAll('#tablaRegistros tbody tr').length;
            document.getElementById('totalSolicitudes').textContent = total;
        }

        function renumerarFilas() {
            let filas = document.querySelectorAll('#tablaRegistros tbody tr');
            filas.forEach((fila, index) => {
                fila.querySelector('td:first-child strong').textContent = index + 1;
            });
        }

        function eliminarFila(boton) {
            boton.closest('tr').remove();
            renumerarFilas();
            actualizarTotal();
        }

        document.getElementById('miFormulario').addEventListener('submit', function(event) {
            event.preventDefault();
            
            let errores = [];
            let nombre = document.getElementById('nombre').value.trim();
            let email = document.getElementById('email').value.trim();
            let area = document.getElementById('area').value.trim();
            let tipo = document.getElementById('tipo').value.trim();
            let descripcion = document.getElementById('descripcion').value.trim();

            if (nombre === '') errores.push('El campo Nombre es obligatorio.');
            if (email === '') errores.push('El campo Correo Electrónico es obligatorio.');
            if (area === '') errores.push('El campo Área de Trabajo es obligatorio.');
            if (tipo === '') errores.push('Debe seleccionar un Tipo de Solicitud.');
            if (descripcion === '') errores.push('La Descripción del Problema es obligatoria.');

            let erroresDiv = document.getElementById('errores');
            
            if (errores.length > 0) {
                erroresDiv.innerHTML = errores.join('<br>');
                erroresDiv.classList.add('mostrar');
            } else {
                erroresDiv.innerHTML = '';
                erroresDiv.classList.remove('mostrar');
                
                let tbody = document.querySelector('#tablaRegistros tbody');
                let tr = document.createElement('tr');
                
                let badgeClass = '';
                let iconClass = '';
                
                if (tipo === 'Hardware') {
                    badgeClass = 'badge-hardware';
                    iconClass = 'fa-solid fa-gear';
                } else if (tipo === 'Software') {
                    badgeClass = 'badge-software';
                    iconClass = 'fa-solid fa-desktop';
                } else if (tipo === 'Redes') {
                    badgeClass = 'badge-redes';
                    iconClass = 'fa-solid fa-wifi';
                } else if (tipo === 'Seguridad') {
                    badgeClass = 'badge-seguridad';
                    iconClass = 'fa-solid fa-shield-halved';
                }

                tr.innerHTML = `
                    <td><strong></strong></td>
                    <td>${nombre}</td>
                    <td>${area}</td>
                    <td><span class="badge ${badgeClass}"><i class="${iconClass}"></i> ${tipo}</span></td>
                    <td class="col-desc">${descripcion}</td>
                    <td>
                        <button type="button" class="btn-eliminar" onclick="eliminarFila(this)">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                
                tbody.appendChild(tr);
                
                renumerarFilas();
                actualizarTotal();
                
                document.getElementById('miFormulario').reset();
            }
        });
    </script>

</body>
</html>
